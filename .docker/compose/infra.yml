# infra.yml — Только инфраструктура
# Использование: docker compose -f .docker/compose/infra.yml --env-file .env up -d
# Требуется: docker network create mp-network
#
# Запускает только инфраструктуру для локальной разработки.
# Parser и Admin запускаются отдельно на хосте.
#
# Включает:
# - PostgreSQL 16 + pgvector (порт 5433)
# - Redis 7 (порт 6380)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mp-postgres
    environment:
      POSTGRES_DB: ${MP__POSTGRES__POSTGRES_DB}
      POSTGRES_USER: ${MP__POSTGRES__POSTGRES_USER}
      POSTGRES_PASSWORD: ${MP__POSTGRES__POSTGRES_PASSWORD}
    env_file:
      - ${PWD}/.env
    ports:
      - "${MP__DOCKER__DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MP__POSTGRES__POSTGRES_USER} -d ${MP__POSTGRES__POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mp-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mp-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    env_file:
      - ${PWD}/.env
    ports:
      - "${MP__DOCKER__REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mp-network
    restart: unless-stopped

volumes:
  postgres_data:
    name: mp-postgres-data
  redis_data:
    name: mp-redis-data

networks:
  mp-network:
    name: mp-network
    external: true
